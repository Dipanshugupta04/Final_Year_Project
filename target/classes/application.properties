server.port=8080
spring.application.name=MEDICINE
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/Medicine_data?user=root
spring.datasource.username=root
spring.datasource.password=12345678

spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true 
spring.jpa.properties.hibernate.format_sql=true



spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=

spring.security.oauth2.client.registration.github.client-id=
spring.security.oauth2.client.registration.github.client-secret=

# Enable multipart uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB



#Configuration for the gemini llm
spring.ai.gemini.api-key=
spring.ai.gemini.chat.options.model=gemini-pro


