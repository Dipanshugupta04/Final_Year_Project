<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | MediPlus - Healthcare Platform</title>
    <link rel="shortcut icon" href="LOGO.png" type="image/x-icon" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Particles.js library for subtle medical-themed particles -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #e0f2fe 0%, #b8e1ff 50%, #d4eaff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Medical pattern overlay (very subtle) */
        .medical-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 153, 255, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.03) 0%, transparent 25%),
                repeating-linear-gradient(45deg, rgba(0, 153, 255, 0.02) 0px, rgba(0, 153, 255, 0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 1;
        }

        /* Animated particles container */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Floating medical shapes (soft blue) */
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            background: rgba(0, 153, 255, 0.04);
            border-radius: 50%;
            animation: floatShape 18s infinite ease-in-out;
        }

        .shape1 {
            width: 400px;
            height: 400px;
            top: -150px;
            right: -100px;
            animation-delay: 0s;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.05) 0%, transparent 70%);
        }

        .shape2 {
            width: 500px;
            height: 500px;
            bottom: -200px;
            left: -150px;
            animation-delay: 5s;
            background: radial-gradient(circle, rgba(100, 210, 255, 0.05) 0%, transparent 70%);
        }

        .shape3 {
            width: 300px;
            height: 300px;
            top: 30%;
            left: 10%;
            animation-delay: 10s;
            background: radial-gradient(circle, rgba(0, 180, 255, 0.05) 0%, transparent 70%);
        }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: translate(40px, 30px) scale(1.1); opacity: 0.6; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
        }

        /* Auth container - medical white with blue accents */
        .auth-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 45px 40px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px -8px rgba(0, 119, 255, 0.25), 
                        0 0 0 1px rgba(0, 153, 255, 0.15) inset,
                        0 10px 30px -10px rgba(0, 100, 200, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.7);
            animation: containerAppear 0.8s cubic-bezier(0.15, 0.85, 0.35, 1.05) forwards;
            transform-origin: center;
        }

        @keyframes containerAppear {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Logo with medical blue */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: center;
            animation: logoBreathing 3s infinite alternate ease-in-out;
        }

        .logo i {
            font-size: 40px;
            color: #0077be;
            filter: drop-shadow(0 4px 8px rgba(0, 119, 190, 0.3));
            transition: all 0.3s;
        }

        .logo span {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066a0, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        @keyframes logoBreathing {
            0% { transform: scale(1); filter: drop-shadow(0 4px 8px rgba(0, 119, 190, 0.2)); }
            100% { transform: scale(1.02); filter: drop-shadow(0 8px 16px rgba(0, 153, 255, 0.4)); }
        }

        h1 {
            color: #01579b;
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            animation: fadeSlideUp 0.6s ease-out 0.2s both;
        }

        .subtitle {
            color: #0288d1;
            text-align: center;
            margin-bottom: 35px;
            font-size: 16px;
            opacity: 0.9;
            animation: fadeSlideUp 0.6s ease-out 0.3s both;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form inputs with medical blue theme */
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            position: relative;
            width: 100%;
            animation: inputAppear 0.5s ease-out forwards;
            opacity: 0;
            transform: translateX(-8px);
        }

        .input-group:nth-child(1) { animation-delay: 0.35s; }
        .input-group:nth-child(2) { animation-delay: 0.4s; }
        .input-group:nth-child(3) { animation-delay: 0.45s; }
        .input-group:nth-child(4) { animation-delay: 0.5s; }
        .input-group:nth-child(5) { animation-delay: 0.55s; }
        .input-group:nth-child(6) { animation-delay: 0.6s; }

        @keyframes inputAppear {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-group i:first-child {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #4a9eff;
            font-size: 18px;
            transition: all 0.3s;
            z-index: 2;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: white;
            border: 2px solid #d0ebff;
            border-radius: 24px;
            color: #01579b;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 4px 10px rgba(0, 153, 255, 0.05);
        }

        .input-group select {
            appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230077be'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
            color: #01579b;
        }

        .input-group select option {
            background: white;
            color: #01579b;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #0099ff;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 153, 255, 0.2);
            transform: scale(1.01);
        }

        .input-group input::placeholder {
            color: #7bb8da;
            font-weight: 400;
            opacity: 0.8;
        }

        .input-group input:focus + i,
        .input-group select:focus + i {
            color: #0099ff;
            transform: translateY(-50%) scale(1.1);
        }

        /* Password toggle eye */
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #7bb8da;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 3;
        }

        .toggle-password:hover {
            color: #0099ff;
            transform: translateY(-50%) scale(1.15);
        }

        .match-status {
            position: absolute;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
            background: white;
            padding: 2px 8px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,153,255,0.1);
        }

        /* Password strength meter - medical blue gradient */
        .password-strength {
            margin-top: 8px;
            padding: 0 5px;
        }

        .strength-meter {
            height: 8px;
            background: #e3f2fd;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            margin-bottom: 8px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .strength-meter::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9eff, #00bfff, #1e88e5);
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px #4a9eff;
        }

        .strength-text {
            color: #0288d1;
            font-size: 14px;
            font-weight: 500;
        }

        .strength-text span {
            font-weight: 600;
            transition: color 0.3s;
        }

        /* Password requirements with medical styling */
        .password-requirements {
            background: #f0f9ff;
            border-radius: 24px;
            padding: 18px 22px;
            margin: 10px 0 5px;
            border: 1px solid #b8e1ff;
            animation: slideDown 0.5s ease-out 0.7s both;
            transform-origin: top;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: scaleY(0.8) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scaleY(1) translateY(0);
            }
        }

        .password-requirements ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .password-requirements li {
            color: #4a6a7f;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .password-requirements li.valid {
            color: #00a86b;
            text-decoration: line-through 1.5px rgba(0, 168, 107, 0.3);
        }

        .password-requirements li i {
            font-size: 16px;
            width: 20px;
            color: #7bb8da;
        }

        .password-requirements li.valid i {
            color: #00a86b;
        }

        /* Signup button - medical blue gradient */
        .signup-btn {
            background: linear-gradient(145deg, #0099ff, #0066cc);
            border: none;
            border-radius: 40px;
            padding: 18px 28px;
            color: white;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 25px -5px #0099ff80, 0 0 0 1px #ffffff40 inset;
            animation: buttonGentlePulse 3s infinite;
        }

        .signup-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -5px #0099ffb3, 0 0 0 1px #ffffff80 inset;
            gap: 18px;
            background: linear-gradient(145deg, #1aa3ff, #0077e6);
        }

        .signup-btn:active {
            transform: translateY(0);
            box-shadow: 0 8px 15px -5px #0099ff;
        }

        .signup-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s;
        }

        .signup-btn:hover::before {
            left: 100%;
        }

        @keyframes buttonGentlePulse {
            0% { box-shadow: 0 12px 25px -5px #0099ff80; }
            50% { box-shadow: 0 15px 30px -3px #0099ffcc; }
            100% { box-shadow: 0 12px 25px -5px #0099ff80; }
        }

        /* Login link */
        .login-link {
            text-align: center;
            margin-top: 30px;
            color: #0288d1;
            font-size: 15px;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        .login-link a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
            padding-bottom: 2px;
        }

        .login-link a:hover {
            color: #0099ff;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #0099ff, #00ccff);
            transition: width 0.3s;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-container {
                padding: 35px 25px;
                margin: 20px;
            }
            
            h1 {
                font-size: 28px;
            }

            .password-requirements {
                padding: 15px 18px;
            }
        }

        /* Medical touch - small cross icons in background (extremely subtle) */
        .medical-cross {
            position: fixed;
            font-size: 20px;
            color: rgba(0, 153, 255, 0.03);
            pointer-events: none;
            z-index: 1;
            transform: rotate(45deg);
            animation: crossFloat 20s infinite linear;
        }

        .cross1 { top: 5%; left: 5%; }
        .cross2 { bottom: 10%; right: 8%; font-size: 40px; animation-duration: 25s; }
        .cross3 { top: 20%; right: 15%; font-size: 25px; animation-duration: 30s; }

        @keyframes crossFloat {
            0% { transform: rotate(45deg) translate(0, 0); }
            50% { transform: rotate(65deg) translate(20px, 20px); }
            100% { transform: rotate(45deg) translate(0, 0); }
        }
    </style>
</head>

                    <li id="req-upper"><i class="fas fa-circle"></i> One uppercase letter</li>
                    <li id="req-lower"><i class="fas fa-circle"></i> One lowercase letter</li>

            <button type="submit" class="signup-btn">

    <script>
        // Original Google callback (preserved)
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
        }

        // GitHub OAuth functions (preserved exactly)
        const githubClientId = "Ov23liQ5LGfqtPSy9zC3";
        const redirectUri = "http://127.0.0.1:5503/MEDICINE/src/main/resources/login.html";

        function startGitHubLogin() {
            const scope = "read:user user:email";
            const githubAuthUrl = `https://github.com/login/oauth/authorize?client_id=${githubClientId}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${scope}`;
            window.location.href = githubAuthUrl;
        }

        async function handleGitHubCallback() {
            console.log("Handling GitHub callback...");
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get("code");
            const error = urlParams.get("error");

            if (error) {
                console.error("GitHub OAuth error:", error);
                window.location.href = "login.html?error=" + encodeURIComponent(error);
                return;
            }

            if (!code) {
                console.log("No authorization code received");
                return;
            }

            console.log("Received authorization code:", code);

            try {
                console.log("Attempting to exchange code for token...");
                const response = await fetch("http://localhost:8080/auth/github", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Accept: "application/json",
                    },
                    body: JSON.stringify({ code }),
                });

                console.log("Response status:", response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error("Server responded with error:", errorText);
                    throw new Error(errorText || "Authentication failed");
                }

                const data = await response.json();
                console.log("Token exchange successful. Data:", data);
                if (data.user) {
                    const name = JSON.stringify(data.user);
                    console.log("Token exchange successful. Dataname:", name);
                    localStorage.setItem("user", name);
                }

                if (data.jwt) {
                    console.log("Storing JWT and user data...");
                    localStorage.setItem("authToken", data.jwt);
                    localStorage.setItem("email", data.email);

                    if (data.unique_id) {
                        localStorage.setItem("unique_id", data.unique_id);
                    }
                    console.log("Redirecting to index.html...");
                    window.location.href = "index.html";
                } else {
                    throw new Error(data.message || "Authentication failed - no token received");
                }
            } catch (error) {
                console.error("Error during token exchange:", error);
                window.location.href = "login.html?error=" + encodeURIComponent(error.message);
            }
        }

        // Password visibility toggle
        window.togglePasswordVisibility = function(icon) {
            const input = icon.previousElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
            // Gentle feedback animation
            icon.style.transform = 'translateY(-50%) scale(1.2)';
            setTimeout(() => {
                icon.style.transform = 'translateY(-50%) scale(1)';
            }, 150);
        };

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const strengthMeter = document.getElementById('strengthMeter');
        const strengthTextSpan = document.getElementById('strengthText');
        const matchStatus = document.getElementById('matchStatus');

        const reqLength = document.getElementById('req-length');
        const reqUpper = document.getElementById('req-upper');
        const reqLower = document.getElementById('req-lower');
        const reqNumber = document.getElementById('req-number');
        const reqSpecial = document.getElementById('req-special');

        function checkPasswordStrength(password) {
            const requirements = {
                length: password.length >= 8,
                upper: /[A-Z]/.test(password),
                lower: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[^A-Za-z0-9]/.test(password)
            };

            // Update requirement icons
            updateRequirement(reqLength, requirements.length);
            updateRequirement(reqUpper, requirements.upper);
            updateRequirement(reqLower, requirements.lower);
            updateRequirement(reqNumber, requirements.number);
            updateRequirement(reqSpecial, requirements.special);

            // Calculate strength
            const strength = Object.values(requirements).filter(Boolean).length;
            
            // Update meter and text
            const percent = (strength / 5) * 100;
            strengthMeter.style.setProperty('width', percent + '%');
            
            if (strength <= 2) {
                strengthTextSpan.textContent = 'Weak';
                strengthTextSpan.style.color = '#f39c12';
            } else if (strength <= 4) {
                strengthTextSpan.textContent = 'Medium';
                strengthTextSpan.style.color = '#3498db';
            } else {
                strengthTextSpan.textContent = 'Strong';
                strengthTextSpan.style.color = '#2ecc71';
            }
        }

        function updateRequirement(element, isValid) {
            const icon = element.querySelector('i');
            if (isValid) {
                element.classList.add('valid');
                icon.classList.remove('fa-circle');
                icon.classList.add('fa-check-circle');
                icon.style.color = '#2ecc71';
            } else {
                element.classList.remove('valid');
                icon.classList.remove('fa-check-circle');
                icon.classList.add('fa-circle');
                icon.style.color = '#7bb8da';
            }
        }

        // Check password match
        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            if (confirm.length === 0) {
                matchStatus.innerHTML = '';
            } else if (password === confirm) {
                matchStatus.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> Match';
                confirmInput.style.borderColor = '#2ecc71';
            } else {
                matchStatus.innerHTML = '<i class="fas fa-times-circle" style="color:#e74c3c;"></i> No match';
                confirmInput.style.borderColor = '#e74c3c';
            }
        }

        passwordInput.addEventListener('input', function() {
            checkPasswordStrength(this.value);
            checkPasswordMatch();
        });

        confirmInput.addEventListener('input', checkPasswordMatch);

        // Form submit (prevent default for demo - remove to enable actual submission)
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Remove this line to enable actual submission
            console.log('Form submission prevented for demo - remove e.preventDefault() to enable');
            
            // Success animation
            const btn = this.querySelector('.signup-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span>Welcome to MediPlus!</span> <i class="fas fa-check"></i>';
            btn.style.background = 'linear-gradient(145deg, #2ecc71, #27ae60)';
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.style.background = 'linear-gradient(145deg, #0099ff, #0066cc)';
            }, 2000);
        });

        // Initialize particles.js with medical-themed particles
        particlesJS('particles-js', {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: '#0099ff' },
                shape: { type: 'circle' },
                opacity: { value: 0.15, random: true, anim: { enable: true, speed: 0.5, opacity_min: 0.05 } },
                size: { value: 3, random: true, anim: { enable: true, speed: 1, size_min: 0.5 } },
                line_linked: { enable: true, distance: 150, color: '#4a9eff', opacity: 0.1, width: 1 },
                move: { enable: true, speed: 0.8, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { onhover: { enable: true, mode: 'grab' }, onclick: { enable: true, mode: 'push' }, resize: true },
                modes: { grab: { distance: 200, line_linked: { opacity: 0.2 } }, push: { particles_nb: 2 } }
            },
            retina_detect: true
        });

        // GitHub button handler
        document.addEventListener('DOMContentLoaded', function() {
            console.log("DOM loaded. Initializing GitHub auth...");
            
            // Handle callback if present
            if (window.location.search.includes('code=')) {
                handleGitHubCallback();
            }

            // Add click handler for GitHub button (if it were uncommented)
            const githubBtn = document.querySelector('.github-btn');
            if (githubBtn) {
                githubBtn.addEventListener('click', startGitHubLogin);
            }
        });
    </script>
    <!-- Original auth.js link kept -->
    <script src="auth.js"></script>
</body>
