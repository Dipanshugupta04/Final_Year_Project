<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | MediPlus - Healthcare Platform</title>
    <link rel="shortcut icon" href="LOGO.png" type="image/x-icon" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Particles.js for medical-themed animated background -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #d4eaff 0%, #b5dcff 50%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Medical pattern overlay (very subtle) */
        .medical-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(0, 153, 255, 0.03) 0%, transparent 25%),
                radial-gradient(circle at 85% 75%, rgba(0, 200, 255, 0.03) 0%, transparent 30%),
                repeating-linear-gradient(45deg, rgba(0, 153, 255, 0.02) 0px, rgba(0, 153, 255, 0.02) 2px, transparent 2px, transparent 10px);
            pointer-events: none;
            z-index: 1;
        }

        /* Animated particles container */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Floating medical shapes in soft blue */
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            background: rgba(0, 153, 255, 0.04);
            border-radius: 50%;
            animation: floatShape 20s infinite ease-in-out;
        }

        .shape1 {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -120px;
            animation-delay: 0s;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.06) 0%, transparent 70%);
        }

        .shape2 {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -180px;
            animation-delay: 6s;
            background: radial-gradient(circle, rgba(100, 210, 255, 0.06) 0%, transparent 70%);
        }

        .shape3 {
            width: 350px;
            height: 350px;
            top: 40%;
            left: 15%;
            animation-delay: 12s;
            background: radial-gradient(circle, rgba(0, 180, 255, 0.06) 0%, transparent 70%);
        }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: translate(40px, 30px) scale(1.15); opacity: 0.7; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
        }

        /* Auth container - clean medical white with blue accents */
        .auth-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 45px 40px;
            width: 90%;
            max-width: 460px;
            box-shadow: 0 30px 60px -15px rgba(0, 119, 255, 0.3), 
                        0 0 0 1px rgba(0, 153, 255, 0.2) inset,
                        0 15px 35px -10px rgba(0, 100, 200, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.8);
            animation: containerAppear 0.8s cubic-bezier(0.15, 0.85, 0.35, 1.05) forwards;
            transform-origin: center;
        }

        @keyframes containerAppear {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Logo with gentle pulse */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: center;
            animation: logoPulse 3s infinite alternate ease-in-out;
        }

        .logo i {
            font-size: 40px;
            color: #0077be;
            filter: drop-shadow(0 4px 8px rgba(0, 119, 190, 0.3));
        }

        .logo span {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066a0, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        @keyframes logoPulse {
            0% { transform: scale(1); filter: drop-shadow(0 4px 8px rgba(0, 119, 190, 0.2)); }
            100% { transform: scale(1.02); filter: drop-shadow(0 8px 16px rgba(0, 153, 255, 0.4)); }
        }

        h1 {
            color: #01579b;
            font-size: 34px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            animation: fadeSlideUp 0.6s ease-out 0.2s both;
        }

        .subtitle {
            color: #0288d1;
            text-align: center;
            margin-bottom: 35px;
            font-size: 16px;
            opacity: 0.9;
            animation: fadeSlideUp 0.6s ease-out 0.3s both;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form inputs with medical blue theme */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
            width: 100%;
            animation: inputAppear 0.5s ease-out forwards;
            opacity: 0;
            transform: translateX(-8px);
        }

        .input-group:nth-child(1) { animation-delay: 0.4s; }
        .input-group:nth-child(2) { animation-delay: 0.45s; }
        .input-group:nth-child(3) { animation-delay: 0.5s; }

        @keyframes inputAppear {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-group i:first-child {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #4a9eff;
            font-size: 18px;
            transition: all 0.3s;
            z-index: 2;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 18px 20px 18px 52px;
            background: white;
            border: 2px solid #d0ebff;
            border-radius: 30px;
            color: #01579b;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 4px 12px rgba(0, 153, 255, 0.08);
        }

        .input-group select {
            appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230077be'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
            color: #01579b;
        }

        .input-group select option {
            background: white;
            color: #01579b;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #0099ff;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 153, 255, 0.2);
            transform: scale(1.01);
        }

        .input-group input::placeholder {
            color: #7bb8da;
            font-weight: 400;
            opacity: 0.8;
        }

        .input-group input:focus + i,
        .input-group select:focus + i {
            color: #0099ff;
            transform: translateY(-50%) scale(1.1);
        }

        /* Password toggle eye */
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #7bb8da;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 3;
        }

        .toggle-password:hover {
            color: #0099ff;
            transform: translateY(-50%) scale(1.15);
        }

        /* Options row (remember me + forgot password) */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 15px;
            font-size: 14px;
            animation: fadeIn 0.6s ease-out 0.6s both;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #0288d1;
            cursor: pointer;
        }

        .options input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #0099ff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options input[type="checkbox"]:hover {
            transform: scale(1.1);
        }

        .forgot-password {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
            padding-bottom: 2px;
        }

        .forgot-password:hover {
            color: #0099ff;
        }

        .forgot-password::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #0099ff, #00ccff);
            transition: width 0.3s;
        }

        .forgot-password:hover::after {
            width: 100%;
        }

        /* Login button - medical blue gradient */
        .login-btn {
            background: linear-gradient(145deg, #0099ff, #0066cc);
            border: none;
            border-radius: 40px;
            padding: 18px 28px;
            color: white;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 25px -5px #0099ff80, 0 0 0 1px #ffffff40 inset;
            animation: buttonGentlePulse 3s infinite;
        }

        .login-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -5px #0099ffb3, 0 0 0 1px #ffffff80 inset;
            gap: 18px;
            background: linear-gradient(145deg, #1aa3ff, #0077e6);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 8px 15px -5px #0099ff;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        @keyframes buttonGentlePulse {
            0% { box-shadow: 0 12px 25px -5px #0099ff80; }
            50% { box-shadow: 0 15px 30px -3px #0099ffcc; }
            100% { box-shadow: 0 12px 25px -5px #0099ff80; }
        }

        /* Divider (commented but styled) */
        .divider {
            text-align: center;
            margin: 25px 0 20px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #7bb8da, transparent);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: transparent;
            padding: 0 15px;
            color: #0288d1;
            font-size: 14px;
        }

        /* Social login buttons (commented but styled) */
        .social-login {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0 20px;
            animation: fadeIn 0.6s ease-out 0.8s both;
        }

        .github-btn {
            background: white;
            border: 2px solid #d0ebff;
            border-radius: 40px;
            padding: 12px 30px;
            color: #01579b;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0, 153, 255, 0.1);
        }

        .github-btn:hover {
            border-color: #0099ff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 153, 255, 0.2);
            background: #f0f9ff;
        }

        .github-btn i {
            color: #24292e;
            font-size: 20px;
        }

        /* Signup link */
        .signup-link {
            text-align: center;
            margin-top: 30px;
            color: #0288d1;
            font-size: 15px;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        .signup-link a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
            padding-bottom: 2px;
        }

        .signup-link a:hover {
            color: #0099ff;
        }

        .signup-link a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #0099ff, #00ccff);
            transition: width 0.3s;
        }

        .signup-link a:hover::after {
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Medical cross decorations (very subtle) */
        .medical-cross {
            position: fixed;
            font-size: 22px;
            color: rgba(0, 153, 255, 0.04);
            pointer-events: none;
            z-index: 1;
            transform: rotate(45deg);
            animation: crossFloat 22s infinite linear;
        }

        .cross1 { top: 8%; left: 7%; }
        .cross2 { bottom: 12%; right: 10%; font-size: 45px; animation-duration: 28s; }
        .cross3 { top: 25%; right: 18%; font-size: 30px; animation-duration: 32s; }

        @keyframes crossFloat {
            0% { transform: rotate(45deg) translate(0, 0); opacity: 0.04; }
            50% { transform: rotate(65deg) translate(25px, 20px); opacity: 0.08; }
            100% { transform: rotate(45deg) translate(0, 0); opacity: 0.04; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-container {
                padding: 35px 25px;
                margin: 20px;
            }
            
            h1 {
                font-size: 28px;
            }

            .options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Medical pattern overlay -->
    <div class="medical-pattern"></div>

    <!-- Very subtle medical crosses -->
    <i class="fas fa-plus medical-cross cross1"></i>
    <i class="fas fa-plus medical-cross cross2"></i>
    <i class="fas fa-plus medical-cross cross3"></i>

    <!-- Particles container for animated background -->
    <div id="particles-js"></div>

    <!-- Floating soft blue shapes -->
    <div class="floating-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <!-- Auth container - Medical white and blue theme -->
    <div class="auth-container">
        <div class="logo">
            <i class="fas fa-heartbeat"></i> <!-- Medical heartbeat icon -->
            <span>MediPlus</span>
        </div>

        <h1>Welcome Back!</h1>
        <p class="subtitle">Login to continue your healthcare journey</p>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" id="loginEmail" placeholder="Enter your Email" required />
            </div>
            
            <div class="input-group">
                <i class="fas fa-user-tag"></i>
                <select name="role" id="role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="ROLE_USER">Patient</option>
                    <option value="ROLE_ADMIN">Admin</option>
                    <option value="ROLE_Assistant">Lab Assistant</option>
                    <option value="ROLE_PHARMACIST">Pharmacist</option>
                    <option value="ROLE_Doctor">Doctor</option>
                </select>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="loginPassword" placeholder="Enter your Password" required />
                <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility(this)"></i>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox" name="remember" /> Remember me
                </label>
                <a href="forgetsendotp.html" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">
                <span>Login</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <!-- Commented sections preserved exactly as in original -->
        <!-- <div class="divider">
            <span>or continue with</span>
        </div> -->

        <div class="social-login">
            <!-- Google Sign-In (commented as in original) -->
            <!-- <div
                id="g_id_onload"
                data-client_id="28528016565-mh7fu89ejf17lmddf1mtcot5e8btcap1.apps.googleusercontent.com"
                data-callback="handleCredentialResponse"
                data-auto_prompt="false"
            ></div>
            <div class="g_id_signin" data-type="standard"></div> -->

            <!-- GitHub button (commented as in original) -->
            <!-- <button type="button" class="github-btn" id="githubLoginBtn">
                <i class="fab fa-github"></i> GitHub
            </button> -->
        </div>

        <p class="signup-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </p>
    </div>

    <script>
        // Original Google callback (preserved)
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            // Handle the Google Sign-In response as needed here
        }

        // ===== GitHub OAuth Configuration (preserved exactly) =====
        const githubClientId = "Ov23liQ5LGfqtPSy9zC3";
        const redirectUri = "http://127.0.0.1:5503/MEDICINE/src/main/resources/login.html";

        function startGitHubLogin() {
            const scope = "read:user user:email";
            const githubAuthUrl = `https://github.com/login/oauth/authorize?client_id=${githubClientId}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${scope}`;
            window.location.href = githubAuthUrl;
        }

        async function handleGitHubCallback() {
            console.log("Handling GitHub callback...");
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get("code");
            console.log(code);
            const error = urlParams.get("error");

            if (error) {
                console.error("GitHub OAuth error:", error);
                window.location.href = "login.html?error=" + encodeURIComponent(error);
                return;
            }

            if (!code) {
                console.log("No authorization code received");
                return;
            }

            console.log("Received authorization code:", code);

            try {
                console.log("Attempting to exchange code for token...");

                const response = await fetch("http://localhost:8080/auth/github", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Accept: "application/json",
                    },
                    body: JSON.stringify({ code }),
                });

                console.log("Response status:", response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error("Server responded with error:", errorText);
                    throw new Error(errorText || "Authentication failed");
                }

                const data = await response.json();
                console.log("Token exchange successful. Data:", data);
                if (data.user) {
                    const name = JSON.stringify(data.user);
                    console.log("Token exchange successful. Dataname:", name);
                    localStorage.setItem("user", name);
                }

                if (data.jwt) {
                    console.log("Storing JWT and user data...");
                    localStorage.setItem("authToken", data.jwt);
                    localStorage.setItem("email", data.email);

                    if (data.unique_id) {
                        localStorage.setItem("unique_id", data.unique_id);
                    }
                    console.log("Redirecting to index.html...");
                    window.location.href = "index.html";
                } else {
                    throw new Error(data.message || "Authentication failed - no token received");
                }
            } catch (error) {
                console.error("Error during token exchange:", error);
                window.location.href = "login.html?error=" + encodeURIComponent(error.message);
            }
        }

        // Password visibility toggle function
        window.togglePasswordVisibility = function(icon) {
            const input = icon.previousElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
            // Gentle feedback animation
            icon.style.transform = 'translateY(-50%) scale(1.2)';
            setTimeout(() => {
                icon.style.transform = 'translateY(-50%) scale(1)';
            }, 150);
        };

        // Initialize particles.js with medical-themed particles
        particlesJS('particles-js', {
            particles: {
                number: { value: 50, density: { enable: true, value_area: 800 } },
                color: { value: '#0099ff' },
                shape: { type: 'circle' },
                opacity: { value: 0.15, random: true, anim: { enable: true, speed: 0.6, opacity_min: 0.05 } },
                size: { value: 3.5, random: true, anim: { enable: true, speed: 1.2, size_min: 0.5 } },
                line_linked: { enable: true, distance: 150, color: '#4a9eff', opacity: 0.1, width: 1 },
                move: { enable: true, speed: 0.8, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { onhover: { enable: true, mode: 'grab' }, onclick: { enable: true, mode: 'push' }, resize: true },
                modes: { grab: { distance: 200, line_linked: { opacity: 0.2 } }, push: { particles_nb: 3 } }
            },
            retina_detect: true
        });

        // Form submission with success animation (preserve actual functionality)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Remove this line to enable actual form submission
            console.log('Login form submission - add your authentication logic here');
            
            // Success animation for demo purposes
            const btn = this.querySelector('.login-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span>Welcome back!</span> <i class="fas fa-check"></i>';
            btn.style.background = 'linear-gradient(145deg, #2ecc71, #27ae60)';
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.style.background = 'linear-gradient(145deg, #0099ff, #0066cc)';
            }, 1500);
        });

        // Initialize when DOM is loaded
        document.addEventListener("DOMContentLoaded", function () {
            console.log("DOM loaded. Initializing GitHub auth...");

            // Add click handler for GitHub button (if it were uncommented)
            const githubBtn = document.getElementById("githubLoginBtn");
            if (githubBtn) {
                githubBtn.addEventListener("click", startGitHubLogin);
            }

            // Handle callback if we're on the login page
            if (window.location.search.includes("code=")) {
                handleGitHubCallback();
            }
        });
    </script>
    <!-- Original auth.js link kept -->
    <script src="auth.js"></script>
</body>
</html>
